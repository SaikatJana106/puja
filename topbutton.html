<style>
  #site-scroll {
    color: #fff;
    line-height: 48px;
    cursor: pointer;
    height: 48px;
    right: 20px;
    position: fixed;
    border-radius: 50%;
    text-align: center;
    transition: all .3s ease 0s;
    width: 48px;
    bottom: 65px;
    z-index: 9999;
    display: block !important;
    background: #9b5b1d;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    user-select: none;
  }

  #site-scroll:hover {
    transform: translateY(-2px);
  }

  #site-scroll i,
  #site-scroll span {
    font-size: 20px;
    font-weight: 700;
    display: inline-block;
    transform: translateY(-1px);
  }
</style>

<span id="site-scroll" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })" aria-label="Go to top" title="Go to top">
  <i class="bi bi-arrow-up-short" style="font-size: 30px;"></i>
</span>
